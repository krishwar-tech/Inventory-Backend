spring.application.name=management

spring.datasource.url=jdbc:mysql://localhost:3306/stockflow_multitenant_dev
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.inventory.management=DEBUG
logging.level.org.springframework.security=DEBUG

logging.file.name=logs/stockflow.log

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

server.port=${PORT:8080}